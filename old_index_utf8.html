п»ї<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning App Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ?ВЂ?ВЂ?ВЂ Slacc Design Tokens ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    :root {
      --primary:        #4a154b;
      --primary-deep:   #481a54;
      --primary-press:  #611f69;
      --primary-tint:   #592466;
      --on-primary:     #ffffff;
      
      --ink:            #1d1d1d;
      --ink-mute:       #696969;
      --link-blue:      #1264a3;
      --link-hover:     #3860be;
      
      --canvas:         #ffffff;
      --canvas-cream:   #f4ede4;
      --canvas-lavender:#f9f0ff;
      --hairline:       #e6e6e6;
      --semantic-error: #cc4117;

      --radius-sm:      4px;
      --radius-md:      8px;
      --radius-lg:      12px;
      --radius-xl:      16px;
      --radius-pill:    90px;

      --transition:     .2s ease-in-out;

      /* Pastel mesh gradient (hero depth) */
      --mesh-bg: radial-gradient(circle at 10% 20%, #f4ede4 0, transparent 35%),
                 radial-gradient(circle at 80% 10%, #f9f0ff 0, transparent 30%),
                 radial-gradient(circle at 50% 80%, #efe2ff 0, transparent 35%),
                 #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    button { cursor: pointer; border: none; font-family: inherit; }
    a { color: var(--link-blue); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    /* ?ВЂ?ВЂ?ВЂ Typography (Display & Body) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    h1, h2, h3 { font-weight: 700; color: var(--ink); }
    .display-md { font-size: 32px; line-height: 1.25; letter-spacing: -0.256px; }
    .heading-lg { font-size: 24px; line-height: 1.33; letter-spacing: -0.096px; }
    .heading-md { font-size: 22px; font-weight: 600; line-height: 1.4; }
    .heading-sm { font-size: 18px; font-weight: 600; line-height: 1.56; letter-spacing: -0.0216px; }
    .body-lg    { font-size: 18px; line-height: 1.55; letter-spacing: -0.0216px; }
    .body-md    { font-size: 16px; line-height: 1.55; }
    .caption    { font-size: 14px; line-height: 1.43; letter-spacing: 0.1px; color: var(--ink-mute); }
    .micro-cap  { font-size: 12px; font-weight: 700; line-height: 1; letter-spacing: 0.96px; text-transform: uppercase; }

    /* ?ВЂ?ВЂ?ВЂ Buttons ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-pill);
      font-size: 16px; font-weight: 700; line-height: 1.38; letter-spacing: 0.2px;
      padding: 14px 28px; /* generous padding */
      transition: background var(--transition), transform var(--transition);
    }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-press); }
    .btn-secondary { background: var(--canvas-lavender); color: var(--ink); padding: 10px 30px; }
    .btn-secondary:hover { background: #efe2ff; }
    .btn-outline { background: var(--canvas); color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--canvas-cream); }
    .btn-cap { font-size: 14px; padding: 10px 20px; }

    /* ?ВЂ?ВЂ?ВЂ Inputs ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    .text-input {
      background: var(--canvas); color: var(--ink);
      font-family: inherit; font-size: 16px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--hairline);
      outline: none;
      width: 100%;
    }
    .text-input:focus { border-color: var(--primary); }

    /* ?ВЂ?ВЂ?ВЂ Header ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    header {
      background: var(--canvas);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--hairline);
      position: sticky; top: 0; z-index: 100;
    }
    .brand-logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
    .header-nav { display: flex; gap: 16px; align-items: center; }
    
    .search-bar { position: relative; width: 300px; }
    .search-bar input { border-radius: var(--radius-pill); padding-left: 36px; }
    .search-icon { position: absolute; left: 12px; top: 11px; color: var(--ink-mute); font-size: 14px; pointer-events: none;}

    /* ?ВЂ?ВЂ?ВЂ Main Layout ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    #main-container {
      display: flex; flex: 1; overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 240px; border-right: 1px solid var(--hairline);
      padding: 24px 16px; background: var(--canvas);
      overflow-y: auto; height: calc(100vh - 70px);
    }
    .nav-label { margin-bottom: 12px; padding: 0 12px; }
    .nav-item {
      padding: 10px 12px; border-radius: var(--radius-md);
      font-size: 16px; color: var(--ink-mute); cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 4px;
    }
    .nav-item:hover { background: var(--canvas-cream); color: var(--ink); }
    .nav-item.active { background: var(--primary); color: var(--on-primary); font-weight: 600; }
    
    /* Content Area */
    main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      background: var(--mesh-bg);
    }
    
    .hero {
      padding: 64px 48px 48px;
    }
    .hero h1 { margin-bottom: 16px; }
    .hero p { max-width: 600px; color: var(--ink-mute); }

    /* ?ВЂ?ВЂ?ВЂ Card Grid ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    .section-wrapper {
      padding: 0 48px 64px;
    }
    .card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px; margin-top: 24px;
    }

    .app-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      padding: 24px;
      display: flex; flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      position: relative;
    }
    .app-card:hover {
      box-shadow: 0 8px 24px rgba(74,21,75,0.08);
      transform: translateY(-2px);
    }
    .app-card.today-card {
      background: var(--primary); color: var(--on-primary);
    }
    .app-card.today-card .heading-sm { color: var(--on-primary); }
    .app-card.today-card .caption { color: var(--on-aubergine-mute); }

    .card-eyebrow {
      display: inline-block; padding: 4px 12px; background: var(--canvas-cream);
      color: var(--ink); border-radius: var(--radius-pill); margin-bottom: 16px;
    }
    .app-card.today-card .card-eyebrow { background: var(--primary-tint); color: var(--on-primary); }

    .card-content { flex: 1; margin-bottom: 24px; }
    .card-content h3 { margin-bottom: 8px; }
    .card-actions { margin-top: auto; }
    .card-actions .btn { width: 100%; }
    
    /* Delete button (Teacher Mode) */
    .btn-delete {
      position: absolute; top: 16px; right: 16px;
      background: var(--canvas-cream); color: var(--semantic-error);
      width: 32px; height: 32px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
    }
    .btn-delete:hover { background: #ffebee; }
    .teacher-active .app-card:hover .btn-delete { display: flex; }

    /* ?ВЂ?ВЂ?ВЂ Modal ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    
    .modal-box {
      background: var(--canvas); border-radius: var(--radius-xl);
      padding: 40px; max-width: 500px; width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 24px; right: 24px;
      font-size: 24px; color: var(--ink-mute); cursor: pointer;
      background: none; border: none;
    }
    
    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    
    /* ?ВЂ?ВЂ?ВЂ Footer ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
    footer {
      background: var(--primary); padding: 32px 48px; color: var(--on-primary);
    }
    .footer-links a { color: var(--on-aubergine-mute); margin-right: 24px; text-decoration: none;}
    .footer-links a:hover { color: var(--on-primary); text-decoration: underline; }

    @media (max-width: 768px) {
      aside { display: none; }
      .hero { padding: 40px 24px 24px; }
      .section-wrapper { padding: 0 24px 40px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand-logo">Learning Portal</div>
  <div class="header-nav">
    <div class="search-bar">
      <span class="search-icon">?лµ‡</span>
      <input type="text" id="search-input" class="text-input" placeholder="Search apps..." oninput="handleSearch(this.value)" />
    </div>
    <button class="btn btn-secondary btn-cap" id="teacher-toggle" onclick="toggleTeacherMode()">Teacher Mode</button>
  </div>
</header>

<div id="main-container">
  <aside>
    <div class="micro-cap nav-label">Categories</div>
    <div id="nav-items-container">
      <!-- Categories injected via JS -->
    </div>
    
    <div class="micro-cap nav-label" style="margin-top: 32px; display: none;" id="admin-label">Admin</div>
    <div id="admin-actions" style="display: none;">
      <button class="btn btn-outline btn-cap" style="width: 100%;" onclick="openAddAppModal()">+ Add Web App</button>
    </div>
  </aside>

  <main>
    <div class="hero">
      <h1 class="display-md">Welcome to your learning space</h1>
      <p class="body-lg">Explore curated web apps for coding, AI, and digital ethics. Find the right tool for your next lesson.</p>
    </div>
    
    <div class="section-wrapper">
      <h2 class="heading-md" id="section-title">All Apps</h2>
      <div class="card-grid" id="app-grid">
        <!-- Apps injected via JS -->
      </div>
    </div>
  </main>
</div>

<footer>
  <div class="footer-links">
    <a href="#" onclick="alert('Terms of Service')">Terms of Service</a>
    <a href="#" onclick="alert('Privacy Policy')">Privacy Policy</a>
    <span class="caption" style="color: var(--on-aubergine-mute); float: right;">м§¤ 2026 Learning Portal</span>
  </div>
</footer>

<!-- ?ВЂ?ВЂ?ВЂ Add App Modal ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ -->
<div class="modal-overlay" id="add-app-modal" onclick="closeModal(event, 'add-app-modal')">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModalDirect('add-app-modal')">нљћ</button>
    <h2 class="heading-md" style="margin-bottom: 24px;">Add New App</h2>
    
    <form id="add-app-form" onsubmit="saveApp(event)">
      <div class="form-group">
        <label>App Title</label>
        <input type="text" id="form-title" class="text-input" required placeholder="e.g. Logic Puzzle Game" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="form-category" class="text-input" required placeholder="e.g. Coding" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="form-desc" class="text-input" required placeholder="Short description..." />
      </div>
      <div class="form-group">
        <label>URL / Link</label>
        <input type="url" id="form-url" class="text-input" required placeholder="https://..." />
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="form-today" style="width: 16px; height: 16px;"/>
        <label style="margin: 0; font-weight: 400;">Mark as "Today's App"</label>
      </div>
      
      <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
        <button type="button" class="btn btn-secondary" onclick="closeModalDirect('add-app-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save App</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ?ВЂ?ВЂ?ВЂ Default Hardcoded Apps (Fallback) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
const DEFAULT_APPS = [
  {
    id: 'app-1',
    title: 'AI Ethics Game',
    category: 'AI & Ethics',
    desc: 'Interactive scenarios to understand AI bias and ethical decision making.',
    url: 'https://example.com/ethics',
    isToday: true
  },
  {
    id: 'app-2',
    title: 'Function Debugger',
    category: 'Coding',
    desc: 'Find and fix broken logic blocks to help the character jump.',
    url: 'https://example.com/debug',
    isToday: false
  },
  {
    id: 'app-3',
    title: 'Algorithm Maze',
    category: 'Coding',
    desc: 'Use sequencing and loops to escape the labyrinth.',
    url: 'https://example.com/maze',
    isToday: false
  },
  {
    id: 'app-4',
    title: 'Teachable Machine',
    category: 'AI & Ethics',
    desc: 'Train your own image classification model right in the browser.',
    url: 'https://teachablemachine.withgoogle.com/',
    isToday: false
  }
];

/* ?ВЂ?ВЂ?ВЂ State ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
let apps = [];
let currentCategory = 'All Apps';
let isTeacherMode = false;
let searchQuery = '';

/* ?ВЂ?ВЂ?ВЂ Init ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
function init() {
  loadApps();
  renderSidebar();
  renderGrid();
}

function loadApps() {
  const stored = localStorage.getItem('portal_apps');
  if (stored) {
    try {
      apps = JSON.parse(stored);
    } catch(e) {
      apps = [...DEFAULT_APPS];
    }
  } else {
    apps = [...DEFAULT_APPS];
    localStorage.setItem('portal_apps', JSON.stringify(apps));
  }
}

function persistApps() {
  localStorage.setItem('portal_apps', JSON.stringify(apps));
}

/* ?ВЂ?ВЂ?ВЂ UI Rendering ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
function renderSidebar() {
  const container = document.getElementById('nav-items-container');
  const cats = ['All Apps', ...new Set(apps.map(a => a.category))];
  
  container.innerHTML = cats.map(cat => {
    const isActive = cat === currentCategory ? 'active' : '';
    let count = cat === 'All Apps' ? apps.length : apps.filter(a => a.category === cat).length;
    return \`
      <div class="nav-item \${isActive}" onclick="setCategory('\${cat}')">
        <span>\${cat}</span>
        <span class="micro-cap" style="opacity:0.6">\${count}</span>
      </div>
    \`;
  }).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  document.getElementById('section-title').textContent = cat;
  renderSidebar();
  renderGrid();
}

function handleSearch(val) {
  searchQuery = val.toLowerCase().trim();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('app-grid');
  
  let filtered = apps.filter(a => {
    const matchCat = currentCategory === 'All Apps' ? true : a.category === currentCategory;
    const matchSearch = a.title.toLowerCase().includes(searchQuery) || a.desc.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });

  // Sort: Today's apps first
  filtered.sort((a, b) => (b.isToday ? 1 : 0) - (a.isToday ? 1 : 0));

  if (filtered.length === 0) {
    grid.innerHTML = \`<div class="body-md" style="color:var(--ink-mute); grid-column: 1/-1;">No apps found.</div>\`;
    return;
  }

  grid.innerHTML = filtered.map(app => {
    const todayClass = app.isToday ? 'today-card' : '';
    const eyebrowLabel = app.isToday ? '??Today\\'s App' : app.category;
    const btnClass = app.isToday ? 'btn-outline' : 'btn-secondary';
    
    return \`
      <div class="app-card \${todayClass}" onclick="window.open('\${app.url}', '_blank')">
        <button class="btn-delete" onclick="deleteApp(event, '\${app.id}')" title="Delete App">нљћ</button>
        <div class="card-content">
          <span class="micro-cap card-eyebrow">\${eyebrowLabel}</span>
          <h3 class="heading-sm">\${app.title}</h3>
          <p class="caption">\${app.desc}</p>
        </div>
        <div class="card-actions">
          <button class="btn \${btnClass} btn-cap">Launch App</button>
        </div>
      </div>
    \`;
  }).join('');
}

/* ?ВЂ?ВЂ?ВЂ Teacher Mode (Admin) ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
function toggleTeacherMode() {
  isTeacherMode = !isTeacherMode;
  const btn = document.getElementById('teacher-toggle');
  const adminLabel = document.getElementById('admin-label');
  const adminActions = document.getElementById('admin-actions');
  const grid = document.getElementById('app-grid');

  if (isTeacherMode) {
    btn.textContent = 'Exit Teacher Mode';
    btn.classList.replace('btn-secondary', 'btn-primary');
    adminLabel.style.display = 'block';
    adminActions.style.display = 'block';
    grid.classList.add('teacher-active');
  } else {
    btn.textContent = 'Teacher Mode';
    btn.classList.replace('btn-primary', 'btn-secondary');
    adminLabel.style.display = 'none';
    adminActions.style.display = 'none';
    grid.classList.remove('teacher-active');
  }
}

/* ?ВЂ?ВЂ?ВЂ Add & Delete Logic ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ */
function openAddAppModal() {
  document.getElementById('add-app-form').reset();
  document.getElementById('add-app-modal').classList.add('open');
}

function closeModal(e, id) {
  if (e.target.id === id) closeModalDirect(id);
}

function closeModalDirect(id) {
  document.getElementById(id).classList.remove('open');
}

function saveApp(e) {
  e.preventDefault();
  
  const newApp = {
    id: 'app-' + Date.now(),
    title: document.getElementById('form-title').value,
    category: document.getElementById('form-category').value,
    desc: document.getElementById('form-desc').value,
    url: document.getElementById('form-url').value,
    isToday: document.getElementById('form-today').checked
  };

  apps.push(newApp);
  persistApps();
  
  closeModalDirect('add-app-modal');
  renderSidebar();
  renderGrid();
}

function deleteApp(e, id) {
  e.stopPropagation(); // prevent opening URL
  if(confirm('Are you sure you want to delete this app?')) {
    apps = apps.filter(a => a.id !== id);
    persistApps();
    renderSidebar();
    renderGrid();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
