function matchesSearch(app) {
  if (!searchQuery) return true;
  const hay = [app.title, app.category, app.grade, app.desc, ...(app.tags || [])].join(' ').toLowerCase();
  return hay.includes(searchQuery);
}

function renderApps() {
  const todayStrip  = document.getElementById('strip-today');
  const appsStrip   = document.getElementById('strip-apps');
  const todaySec    = document.getElementById('section-today');

  // Today strip
  const todayApps = APPS.filter(a => a.isToday && a.isPublic && matchesSearch(a));
  todaySec.style.display = todayApps.length ? 'block' : 'none';
  todayStrip.innerHTML = todayApps.map(app => renderTodayCard(app)).join('');

  // Main strip
  let filtered = APPS.filter(a => {
    if (!a.isPublic) return false;
    if (!matchesSearch(a)) return false;
    if (currentCategory === '?꾩껜??) return true;
    if (currentCategory === '?ㅻ뒛???섏뾽??) return a.isToday;
    return a.category === currentCategory;

          ${(app.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}
        </div>
        <button class="btn-preview" onclick="event.stopPropagation(); openPreview('${app.id}')">誘몃━蹂닿린</button>
      </div>
    </div>`;
}

function renderTodayCard(app) {
  return `
    <div class="today-card" id="today-card-${app.id}" onclick="openPreview('${app.id}')" tabindex="0" role="button" aria-label="${app.title} ?ㅻ뒛???섏뾽??>
      <div class="card-thumb" style="background: rgba(255,255,255,.12)">${app.emoji}</div>
      <div class="card-body">
        <div class="card-label">狩??ㅻ뒛???섏뾽??/div>
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
        <button class="btn-enter" onclick="event.stopPropagation(); openPreview('${app.id}')">?? ?쒖옉?섍린</button>
      </div>
    </div>`;
}

/* ?? App Preview Modal ?????????????????????????????? */
function openPreview(appId) {
  const app = APPS.find(a => a.id === appId);
  if (!app) return;
  currentApp = app;

  document.getElementById('modal-thumb').style.background = app.bg;
  document.getElementById('modal-thumb').childNodes[0].style.cssText = `
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:80px;`;
  // Re-render thumb content
  const thumb = document.getElementById('modal-thumb');
  thumb.style.background = app.bg;
  thumb.innerHTML = `
    <span style="font-size:80px;">${app.emoji}</span>
    <button class="modal-close-btn" onclick="closePreviewDirect()" aria-label="?リ린">??/button>
  `;

  document.getElementById('modal-meta').innerHTML = `
    <span class="cat-badge">${app.category}</span>
    <span class="grade-badge" style="border:1px solid #e0e0e0;padding:2px 9px;border-radius:90px;font-size:10px;">${app.grade}</span>
    <span style="font-size:10px;color:#9b9b9b;padding:2px 9px;">??${app.time}</span>
  `;
  document.getElementById('modal-app-title').textContent = app.title;
  document.getElementById('modal-desc').textContent = app.desc;
  document.getElementById('modal-goals').innerHTML =
    (app.goals||[]).map(g=>`<div class="modal-goal-item">${g}</div>`).join('');
  document.getElementById('modal-info-row').innerHTML = `
    <span class="modal-info-chip"><span class="chip-icon">?뱛</span> ${app.category}</span>
    <span class="modal-info-chip"><span class="chip-icon">?럳</span> ${app.grade}</span>
    <span class="modal-info-chip"><span class="chip-icon">??/span> ${app.time}</span>
  `;

  document.getElementById('preview-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePreview(e) {
  if (e.target === document.getElementById('preview-overlay')) closePreviewDirect();
}
function closePreviewDirect() {
  document.getElementById('preview-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentApp = null;
}

function runApp() {
  if (!currentApp) return;
  if (currentApp.url && currentApp.url !== '#') {
    window.open(currentApp.url, '_blank', 'noopener');
  } else {
    alert(`"${currentApp.title}" ?깆? ?꾩옱 以鍮?以묒엯?덈떎.\n怨??낅뜲?댄듃???덉젙?댁뿉?? ??`);
  }
}

/* ?? Legal Modals ??????????????????????????????????? */
function openLegal(overlayId) {
  document.getElementById(overlayId).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLegal(overlayId, e) {
  if (e.target === document.getElementById(overlayId)) closeLegalDirect(overlayId);
}
function closeLegalDirect(overlayId) {
  document.getElementById(overlayId).classList.remove('open');
  document.body.style.overflow = '';
}

/* ?? Keyboard accessibility ????????????????????????? */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePreviewDirect();
    closeLegalDirect('terms-overlay');
    closeLegalDirect('privacy-overlay');
  }
});

/* ?? Footer link keyboard support ?????????????????? */
document.querySelectorAll('.footer-link[tabindex="0"]').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
});

document.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  renderApps();
  checkEthicsGate();
});
</script>
